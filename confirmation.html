<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Order Confirmed — MotorCity Casino Hotel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/motor-city.css" rel="stylesheet" />
</head>
<body>
  <header class="mc-top-nav" data-figma-node="204:39463">
    <a href="index.html" class="btn btn-link p-0 border-0 bg-transparent text-white" aria-label="Home">Home</a>
    <span class="mc-logo-text text-white fw-bold">Order confirmed</span>
    <span></span>
  </header>

  <main class="mc-container py-4">
    <p class="text-mc-success text-center mb-2">Order received</p>
    <h1 class="mc-section-title">Pick up here</h1>

    <!-- FR-04: order ID, summary, restaurant, pickup location, estimated time -->
    <div class="mc-payment-breakdown">
      <div class="mb-2">
        <span class="text-mc-muted small">Order ID</span>
        <div class="mc-confirm-id">MC-8842</div>
      </div>
      <div class="mb-2">
        <span class="text-mc-muted small">Restaurant</span>
        <div>Grand River Deli & Burgers</div>
      </div>
      <div class="mb-2">
        <span class="text-mc-muted small">Pickup location</span>
        <div>Food Court — Window 2</div>
      </div>
      <div class="mb-2">
        <span class="text-mc-muted small">Estimated pickup</span>
        <div class="mc-confirm-pickup">~15 min</div>
      </div>
      <hr class="border-secondary" />
      <div class="small">
        <div>Classic Smash Burger × 1</div>
        <div>Caesar Salad × 1</div>
      </div>
    </div>

    <a href="index.html" class="btn btn-mc-primary w-100 mt-3">Order again</a>
  </main>

  <script src="https://code.jquery.com/jquery-3.8.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
