<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cart — MotorCity Casino Hotel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/motor-city.css" rel="stylesheet" />
</head>
<body>
  <header class="mc-top-nav" data-figma-node="204:39463">
    <a href="venue.html?id=burgers" class="btn btn-link p-0 border-0 bg-transparent text-white" aria-label="Back">&#8592;</a>
    <span class="mc-logo-text text-white fw-bold">Cart</span>
    <span class="d-flex flex-column align-items-center"><span class="mc-login-label small">Edit</span></span>
  </header>

  <main class="mc-container py-4">
    <h1 class="mc-section-title">Your order</h1>

    <div class="mc-cart-list">
      <div class="mc-cart-item d-flex justify-content-between align-items-center">
        <div>
          <strong>Classic Smash Burger</strong>
          <div class="small text-mc-muted">1 × $12.99</div>
        </div>
        <button type="button" class="btn btn-sm btn-outline-secondary" aria-label="Remove">×</button>
      </div>
      <div class="mc-cart-item d-flex justify-content-between align-items-center">
        <div>
          <strong>Caesar Salad</strong>
          <div class="small text-mc-muted">1 × $9.99</div>
        </div>
        <button type="button" class="btn btn-sm btn-outline-secondary" aria-label="Remove">×</button>
      </div>
    </div>

    <div class="mc-cart-footer">
      <div class="d-flex justify-content-between mb-2">
        <span>Subtotal</span>
        <span id="cart-subtotal">$22.98</span>
      </div>
      <a href="checkout.html" class="btn btn-mc-primary w-100">Checkout</a>
    </div>
  </main>

  <nav class="mc-bottom-nav border-top border-secondary py-2 bg-dark fixed-bottom">
    <div class="d-flex justify-content-around">
      <a href="index.html" class="text-white text-decoration-none small">Home</a>
      <a href="cart.html" class="text-white text-decoration-none small">Cart</a>
      <a href="account.html" class="text-white text-decoration-none small">Account</a>
    </div>
  </nav>

  <script src="https://code.jquery.com/jquery-3.8.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
