<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Item — MotorCity Casino Hotel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/motor-city.css" rel="stylesheet" />
</head>
<body>
  <header class="mc-top-nav" data-figma-node="204:39463">
    <a href="menu-items.html?venue=burgers&cat=smash" class="btn btn-link p-0 border-0 bg-transparent text-white" aria-label="Back">&#8592;</a>
    <span class="mc-logo-text text-white fw-bold">Item</span>
    <a href="cart.html" class="d-flex flex-column align-items-center text-white text-decoration-none">
      <span class="small">Cart</span>
      <span class="badge bg-mc-teal rounded-pill" id="cart-count">0</span>
    </a>
  </header>

  <main class="mc-container py-4">
    <h1 class="h4 mb-2">Classic Smash Burger</h1>
    <p class="text-mc-muted small mb-3">Double patty, cheese, pickles, smash sauce. Served with fries.</p>
    <p class="mb-4"><strong class="text-mc-teal">$12.99</strong></p>

    <div class="mb-3">
      <label class="form-label small">Options (optional)</label>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="options" id="opt1" checked />
        <label class="form-check-label" for="opt1">Standard</label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="options" id="opt2" />
        <label class="form-check-label" for="opt2">Add bacon (+$2)</label>
      </div>
    </div>

    <button type="button" class="btn btn-mc-primary w-100">Add to Cart</button>
  </main>

  <script src="https://code.jquery.com/jquery-3.8.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
