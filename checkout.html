<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout — MotorCity Casino Hotel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/motor-city.css" rel="stylesheet" />
</head>
<body>
  <header class="mc-top-nav" data-figma-node="204:39463">
    <a href="cart.html" class="btn btn-link p-0 border-0 bg-transparent text-white" aria-label="Back">&#8592;</a>
    <span class="mc-logo-text text-white fw-bold">Checkout</span>
    <span></span>
  </header>

  <main class="mc-container py-4">
    <h1 class="mc-section-title">Payment</h1>
    <p class="text-mc-muted small mb-3">Split tender: use card and/or Club Metro comp credits. (NR-02)</p>

    <!-- Split tender — clear breakdown -->
    <div class="mc-payment-breakdown mb-4">
      <div class="d-flex justify-content-between mb-2">
        <span>Order total</span>
        <span>$22.98</span>
      </div>
      <hr class="border-secondary" />
      <p class="small fw-bold mb-2">How do you want to pay?</p>
      <div class="mc-split-tender">
        <div class="form-check mb-2">
          <input class="form-check-input" type="checkbox" id="pay-card" checked />
          <label class="form-check-label" for="pay-card">Pay with card</label>
        </div>
        <div class="form-check mb-2">
          <input class="form-check-input" type="checkbox" id="pay-comp" />
          <label class="form-check-label" for="pay-comp">Use comp credits</label>
        </div>
      </div>
      <div class="mt-2 small text-mc-muted">
        <div class="d-flex justify-content-between"><span>Card</span><span>$22.98</span></div>
        <div class="d-flex justify-content-between"><span>Comp</span><span>$0.00</span></div>
      </div>
    </div>

    <a href="confirmation.html" class="btn btn-mc-primary w-100">Place Order</a>
  </main>

  <script src="https://code.jquery.com/jquery-3.8.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
